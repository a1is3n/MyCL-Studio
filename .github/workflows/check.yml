name: check

# Yayın gate'i: her push/PR'de `npm run check` sunucuda koşulsuz çalışır.
# Yereldeki hiçbir şeye (hook, commit disiplini, hatırlama) bağlı değildir —
# bellek-bağımsız tek garanti katı budur.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install (root)
        run: npm ci

      - name: Install (orchestrator)
        run: npm --prefix orchestrator ci

      - name: Run gate
        run: npm run check

  # Cross-platform derleme gate'i — Tauri host'unun mac + Linux'ta derlendiğini
  # doğrular (kapsam: mac + Linux Ubuntu; Windows şimdilik dışarıda). Doğası gereği
  # CI-only: tek-makine scripts/check.sh cross-OS derleyemez. `cargo check` = compile
  # doğrulaması (B5 sınıfı cfg-dalı hatalarını yakalar); generate_context! frontendDist'i
  # gömdüğü için önce frontend build edilir.
  tauri-compile:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Linux Tauri sistem bağımlılıkları
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libxdo-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install (root)
        run: npm ci

      - name: Install (orchestrator)
        run: npm --prefix orchestrator ci

      # build:all = orchestrator (tsc → orchestrator/dist) + frontend (→ dist).
      # tauri.conf resources orchestrator/dist + node_modules'ı gömdüğü ve
      # generate_context! frontendDist'i okuduğu için ikisi de gerekli (gerçek
      # beforeBuildCommand ile birebir aynı).
      - name: Build orchestrator + frontend
        run: npm run build:all

      - name: cargo check (Tauri host)
        run: cargo check --manifest-path src-tauri/Cargo.toml
